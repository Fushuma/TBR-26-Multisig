<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TimberChain - Final Execution (4 Signers)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f0f0f; color: #e0e0e0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 12px; max-width: 650px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #f44336; padding-bottom: 10px; color: #fff; text-align: center; }
        .sig-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.9em; }
        textarea { width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; border-radius: 4px; box-sizing: border-box; resize: none; font-size: 11px; }
        button { background: #f44336; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
        button:hover { background: #d32f2f; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; font-weight: bold; word-break: break-all; }
        .info { font-size: 0.8em; color: #666; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Safe Execution Panel</h2>
    <p class="info">Collect at least 4 signatures to execute the 20M TBR26 Mint.</p>
    
    <div class="sig-group">
        <label>Signature 1:</label>
        <textarea class="sig-input" placeholder="Paste signature 0x... here"></textarea>
    </div>
    
    <div class="sig-group">
        <label>Signature 2:</label>
        <textarea class="sig-input" placeholder="Paste signature 0x... here"></textarea>
    </div>

    <div class="sig-group">
        <label>Signature 3:</label>
        <textarea class="sig-input" placeholder="Paste signature 0x... here"></textarea>
    </div>

    <div class="sig-group">
        <label>Signature 4:</label>
        <textarea class="sig-input" placeholder="Paste signature 0x... here"></textarea>
    </div>

    <button id="execBtn">Broadcast to Fushuma Network</button>

    <div id="status" class="status"></div>
</div>

<script>
    const SAFE_ADDRESS = "0xCcA8d3E774a8e5b1C4531aaf4e9A553cb2933075";
    const TOKEN_ADDRESS = "0x7aeF7bd25a1344C721Af8feA4E24D16C34867FB7";
    const CHAIN_ID = 121224;

    const SAFE_ABI = [
        "function execTransaction(address to, uint256 value, bytes data, uint8 operation, uint256 safeTxGas, uint256 baseGas, uint256 gasPrice, address gasToken, address refundReceiver, bytes signatures) external returns (bool success)"
    ];

    document.getElementById('execBtn').onclick = async () => {
        const inputs = document.querySelectorAll('.sig-input');
        const rawSignatures = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");

        if (rawSignatures.length < 4) {
            return alert("Error: You need at least 4 signatures to proceed.");
        }

        const status = document.getElementById('status');
        status.style.display = 'block';
        status.style.background = '#333';
        status.innerText = "Analyzing signatures and recovering addresses...";

        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();

            // 1. Préparer les données pour la récupération (EIP-712)
            const iface = new ethers.utils.Interface(["function mint(address to, uint256 amount)"]);
            const mintData = iface.encodeFunctionData("mint", [SAFE_ADDRESS, ethers.utils.parseUnits("20000000", 18)]);

            const domain = { verifyingContract: SAFE_ADDRESS, chainId: CHAIN_ID };
            const types = {
                SafeTx: [
                    { name: "to", type: "address" }, { name: "value", type: "uint256" }, { name: "data", type: "bytes" },
                    { name: "operation", type: "uint8" }, { name: "safeTxGas", type: "uint256" }, { name: "baseGas", type: "uint256" },
                    { name: "gasPrice", type: "uint256" }, { name: "gasToken", type: "address" }, { name: "refundReceiver", type: "address" },
                    { name: "nonce", type: "uint256" }
                ]
            };
            const safeTx = {
                to: TOKEN_ADDRESS, value: 0, data: mintData, operation: 0,
                safeTxGas: 0, baseGas: 0, gasPrice: 0, gasToken: "0x0000000000000000000000000000000000000000",
                refundReceiver: "0x0000000000000000000000000000000000000000", nonce: 0 
            };

            // 2. Extraire l'adresse de chaque signature pour le TRI AUTOMATIQUE
            let parsedSigs = rawSignatures.map(sig => {
                const cleanSig = sig.match(/0x[a-fA-F0-9]{130}/);
                if (!cleanSig) throw new Error("Format de signature invalide (0x... 130 caractères attendu).");
                
                // Récupération magique de l'adresse du signataire
                const recoveredAddr = ethers.utils.verifyTypedData(domain, types, safeTx, cleanSig[0]);
                
                return {
                    address: recoveredAddr.toLowerCase(),
                    signature: cleanSig[0]
                };
            });

            // 3. TRI par adresse (Obligatoire pour le contrat Safe)
            parsedSigs.sort((a, b) => a.address.localeCompare(b.address));

            // 4. Combiner les signatures triées
            let combinedSigs = "0x";
            parsedSigs.forEach(s => {
                combinedSigs += s.signature.slice(2);
            });

            const safeContract = new ethers.Contract(SAFE_ADDRESS, SAFE_ABI, signer);
            
            status.innerText = "Transaction detected! Please confirm in your wallet...";

            // On lance la transaction en forçant le GasLimit pour éviter l'erreur de simulation
            const tx = await safeContract.execTransaction(
                TOKEN_ADDRESS, 0, mintData, 0, 0, 0, 0,
                "0x0000000000000000000000000000000000000000",
                "0x0000000000000000000000000000000000000000",
                combinedSigs,
                { gasLimit: 800000 } 
            );

            status.innerText = "✅ Success! Hash: " + tx.hash;
            status.style.background = "#4CAF50";

        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error: " + (err.reason || err.message);
            status.style.background = "#f44336";
        }
    };
</script>
</body>
</html>
